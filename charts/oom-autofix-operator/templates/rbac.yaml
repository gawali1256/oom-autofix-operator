{{- if .Values.serviceAccount.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "oom-autofix-operator.fullname" . }}-cluster-admin
  labels:
    {{- include "oom-autofix-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: {{ include "oom-autofix-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
