name: Release Helm Chart

on:
  workflow_dispatch: # run manually: Actions → Release Helm Chart → Run workflow
  push:
    branches: [main]
    paths:
      - "Chart.yaml"
      - "values.yaml"
      - "templates/**"
      - "files/**"
      - ".cr.yaml"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Configure Git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.6.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        with:
          charts_dir: .          # chart root IS the repo root
          config: .cr.yaml
